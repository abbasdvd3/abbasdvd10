
socks-port: 10808

mode: rule
allow-lan: true
unified-delay: false
auto-redir: true
enable-process: true
bind-address: '*'
log-level: silent
ipv6: false
external-controller: 0.0.0.0:9090 
external-ui: 
find-process-mode: always 

sniffer:
  enable: false
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  force-domain:
    - '+.v2ex.com'
  skip-domain:
    - '+.google.com'
  sniffing:
    - tls
    - http
  port-whitelist:
    - "80"
    - "443"
tun:
  enable: false
  device: utun
  mtu: 9000
  stack: system
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-redir: true
  auto-detect-interface: true
  inet4-address: 172.19.0.1/30
  inet6-address: [fdfe:dcba:9876::1/126]
  # include_android_user:
    # - 0
    # - 10
  # include_package:
  # - com.android.chrome
  # exclude_package:
    # - com.whatsapp

proxies:

proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - "FALLBACK"
      - "URL-TEST"

  - name: "FALLBACK"
    type: fallback
    include-all-providers: true

  - name: "URL-TEST"
    type: url-test
    include-all-providers: true

  - name: "block"
    type: select
    proxies:
      - "FALLBACK"
      - "REJECT"
